# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    annotations:
        enabled: false
    secret: '%env(APP_SECRET)%'
    #csrf_protection: true
    #http_method_override: true

    # Enables session support. Note that the session will ONLY be started if you read or write from it.
    # Remove or comment this section to explicitly disable session support.
    session:
        enabled: true
        handler_id: null
        cookie_secure: auto
        cookie_httponly: true
        cookie_samesite: lax

    # Trusted proxies/hosts — override via .env.local or cloud environment variables.
    # TRUSTED_PROXIES: comma-separated IPs/CIDRs; REMOTE_ADDR trusts the immediate upstream hop.
    # TRUSTED_HOSTS:   regex matched against the Host header to block host-header injection.
    trusted_proxies: '%env(TRUSTED_PROXIES)%'
    trusted_headers: 'x-forwarded-for,x-forwarded-host,x-forwarded-port,x-forwarded-proto,x-forwarded-prefix'
    trusted_hosts: ['%env(TRUSTED_HOSTS)%']

    #esi: true
    #fragments: true
    php_errors:
        log: true
    error_controller: App\Controller\Error\ErrorController::show

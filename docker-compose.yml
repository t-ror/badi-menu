# =============================================================================
# badi-menu — Development compose file
# Uses the 'dev' Dockerfile target (no baked deps). Code via volume mount.
# Dev extras come from docker-compose.override.yml (auto-loaded).
# =============================================================================

services:
  app:
    build:
      context: ./docker
      target: dev
      args:
        NGINX_CONFIG: nginx.dev.conf
        INSTALL_XDEBUG: "true"
    volumes:
      - .:/var/www
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: mariadb:11.5.2
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-badi_menu}
      MYSQL_USER: ${DB_USER:-badi_menu}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  db_data:
 
name: Build

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/t-ror/badi-menu

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write

    steps:
      - name: Set up SSH for private submodule
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DOCKER_REPO_SSH_KEY }}

      - name: Checkout with submodules
        uses: actions/checkout@v4 # v4.2.2
        with:
          submodules: recursive
          ssh-key: ${{ secrets.DOCKER_REPO_SSH_KEY }}

      - name: Log in to GHCR
        uses: docker/login-action@v3 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3 # v3.10.0

      - name: Build and conditionally push
        uses: docker/build-push-action@v7 # v6.18.0
        with:
          context: ./docker
          file: ./docker/Dockerfile
          target: prod
          build-contexts: app-src=.
          build-args: |
            NGINX_CONFIG=nginx.prod.conf
            INSTALL_XDEBUG=false
          push: ${{ github.event_name == 'workflow_dispatch' }}
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max